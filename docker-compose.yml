version: "3.8"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-geo_collab}
      MYSQL_USER: ${MYSQL_USER:-geo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?required}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      GEO_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-geo_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-geo_collab}
      GEO_DATA_DIR: /app/data
      GEO_PUBLISH_REMOTE_BROWSER_ENABLED: "true"
      GEO_PUBLISH_NOVNC_WEB_DIR: /usr/share/novnc
      GEO_PUBLISH_REMOTE_BROWSER_HOST: 0.0.0.0
      GEO_PUBLISH_XVFB_PATH: Xvfb
      GEO_PUBLISH_X11VNC_PATH: x11vnc
      GEO_PUBLISH_WEBSOCKIFY_PATH: websockify
    volumes:
      - app_data:/app/data

volumes:
  mysql_data:
  app_data:
